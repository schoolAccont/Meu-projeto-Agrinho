<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Projeto: [Meu projeto Agrinho]</title>
<style>
body { 
    background-color: #dcdcdc; /* Fundo base escurecido */
    color: #2c3e50; 
    font-family: sans-serif; 
    margin: 0;
    padding: 0; 
}
.topo-site {
    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad451?q=80&w=1200');
    background-size: cover; 
    background-position: center; 
    color: white; 
    text-align: center;
    padding: 60px 20px;
}

.autor {
    font-size: 1.1em;
    font-style: italic;
    margin-top: 10px;
    opacity: 0.9;
}

.conteudo { 
    max-width: 800px; 
    margin: 30px auto; 
    padding: 20px; 
    background: white; 
    border-radius: 8px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
}

.botao-projeto {
    background-color: #4B0082; /* Roxo escuro */
    color: white; 
    border: none; 
    padding: 12px 30px; 
    font-size: 16px;
    font-weight: bold; 
    border-radius: 30px; 
    cursor: pointer; 
    transition: transform 0.3s ease, background-color 0.3s ease; 
    margin-top: 15px;
}
.botao-projeto:hover { 
    background-color: #300053; /* Roxo ainda mais escuro no hover */
    transform: scale(1.1) translateY(-3px); 
}
</style>
</head>
<body>
<header class="topo-site">
    <h1>[Meu Projeto Agrinho]</h1>
    <p class="autor">Autor: Perseu Baumel Guimarães Reginaldo</p>
</header>
<div class="conteudo">
    <h2>Objetivo: [Nosso objetivo é usar sistemas de irrigação mais econômicos e sustentáveis]</h2>
    
    <p>Descrição: [Nosso objetivo é usar o sistema de irrigação por gotejamento. Economizando água e protegendo o planeta!]</p>
    
    <button class="botao-projeto" onclick="alert('Obrigado pelo apoio!')">Apoiar essa Ideia</button>
</div>
</body>
</html>
